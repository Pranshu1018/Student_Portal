services:
  - type: web
    name: student-portal-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false          # set manually in Render dashboard
